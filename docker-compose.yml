version: '3.8'

services:
  # 1. Serviço Autônomo da Liz (Nosso Microsserviço Express)
  liz-agent-service:
    build: .
    container_name: liz-agent-service
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - postgres-db
      - redis-cache
      - evolution-api
    restart: always

  # 2. Evolution API (Integração WhatsApp)
  evolution-api:
    image: atendare/evolution-api:latest
    container_name: evolution-api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:FreitasAdmin99@postgres-db:5432/freitas_db
      - REDIS_ENABLED=true
      - REDIS_URI=redis://redis-cache:6379/1
      - API_KEY=EvolutionSecretApiKey_2026
    volumes:
      - evolution_data:/evolution/instances
    depends_on:
      - postgres-db
      - redis-cache
    restart: always

  # 3. Redis (Lock Manager e Fila)
  redis-cache:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  # 4. PostgreSQL (Histórico de Chat & Dados de Instância)
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=FreitasAdmin99
      - POSTGRES_DB=freitas_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  evolution_data:
  redis_data:
  postgres_data:
